<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounts — Folo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="accounts.css">
</head>

<body class="app-page">

  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <a href="index.html" class="sidebar-logo">fo<span>lo</span></a>
    <span class="sidebar-section">Main</span>
    <ul class="sidebar-nav">
      <li><a href="dashboard.html"><span class="nav-icon">◈</span> Dashboard</a></li>
      <li><a href="transactions.html"><span class="nav-icon">↕</span> Transactions</a></li>
      <li><a href="budgets.html"><span class="nav-icon">◻</span> Budgets</a></li>
      <li><a href="accounts.html"><span class="nav-icon">◎</span> Accounts</a></li>
    </ul>
    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebarAvatar">Y</div>
        <div>
          <div class="user-name" id="sidebarName">Your Name</div>
          <div style="font-size:0.72rem;color:rgba(255,255,255,0.4)">Personal</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:1rem;">
        <button class="hamburger-btn" onclick="openSidebar()"><span></span><span></span><span></span></button>
        <div class="topbar-title">Accounts</div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-sm" onclick="openAdjustModal()">Adjust balance</button>
        <button class="btn btn-accent btn-sm" onclick="openModal()">+ New account</button>
        <button class="btn btn-ghost btn-sm" onclick="logout()">Log out</button>
      </div>
    </div>

    <div class="page-content">
      <div class="net-worth-bar fade-in" id="nwBar"></div>
      <div class="accounts-grid fade-in-2" id="accountsGrid"></div>

      <!-- Settings -->
      <div class="card fade-in-3">
        <div style="font-family:'Instrument Serif',serif;font-size:1.1rem;margin-bottom:1rem">Profile settings</div>
        <div class="form-row-app">
          <div class="form-group">
            <label class="form-label">Your name</label>
            <input class="form-input" id="settingName" placeholder="Your Name">
          </div>
          <div class="form-group">
            <label class="form-label">Currency</label>
            <select class="form-select" id="settingCurrency">
              <option value="USD">USD — US Dollar</option>
              <option value="EUR">EUR — Euro</option>
              <option value="GBP">GBP — British Pound</option>
              <option value="ZMW">ZMW — Zambian Kwacha</option>
              <option value="KES">KES — Kenyan Shilling</option>
              <option value="NGN">NGN — Nigerian Naira</option>
              <option value="GHS">GHS — Ghanaian Cedi</option>
              <option value="ZAR">ZAR — South African Rand</option>
            </select>
          </div>
        </div>
        <div style="display:flex;gap:0.75rem;align-items:center;margin-top:0.5rem;">
          <button class="btn btn-accent btn-sm" onclick="saveSettings()">Save settings</button>
          <button class="btn btn-danger-soft btn-sm"
            onclick="if(confirm('Reset ALL data? This cannot be undone.')) resetData()">Reset all data</button>
          <button class="btn btn-danger-soft btn-sm"
            onclick="deleteUserAccount()">Delete my account</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD/EDIT MODAL -->
  <div class="modal-backdrop" id="modalBackdrop" onclick="maybeClose(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">New account</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">Account name</label>
        <input class="form-input" id="fName" placeholder="e.g. Main Checking">
      </div>
      <div class="form-row-app">
        <div class="form-group">
          <label class="form-label">Type</label>
          <select class="form-select" id="fType">
            <option value="checking">Checking</option>
            <option value="savings">Savings</option>
            <option value="credit">Credit card</option>
            <option value="cash">Cash</option>
            <option value="investment">Investment</option>
            <option value="mobile">Mobile money</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Current balance</label>
          <input class="form-input" id="fBalance" type="number" step="0.01" placeholder="0.00">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Color</label>
        <div class="color-row" id="colorRow"></div>
      </div>
      <div style="display:flex;gap:0.75rem;margin-top:1.25rem;">
        <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
        <button class="btn btn-accent" style="flex:2" onclick="saveAccount()">Save account</button>
      </div>
    </div>
  </div>

  <!-- ADJUST MODAL -->
  <div class="modal-backdrop" id="adjustBackdrop" onclick="maybeCloseAdj(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Adjust balance</div>
        <button class="modal-close" onclick="closeAdjustModal()">✕</button>
      </div>
      <p style="font-size:0.85rem;color:var(--muted);margin-bottom:1.25rem">Manually set an account's balance without
        creating a transaction record.</p>
      <div class="form-group">
        <label class="form-label">Account</label>
        <select class="form-select" id="adjAcc"></select>
      </div>
      <div class="form-group">
        <label class="form-label">New balance</label>
        <input class="form-input" id="adjBalance" type="number" step="0.01" placeholder="0.00">
      </div>
      <div style="display:flex;gap:0.75rem;margin-top:1.25rem;">
        <button class="btn btn-ghost" style="flex:1" onclick="closeAdjustModal()">Cancel</button>
        <button class="btn btn-accent" style="flex:2" onclick="applyAdjust()">Apply</button>
      </div>
    </div>
  </div>

  <script type="module" src="accounts.js"></script>
  
 
</body>

</html>
