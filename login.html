<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Folo</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="login.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-right">
    <div class="auth-form-wrap">
      <div class="auth-form-title">Welcome back</div>
      <div class="auth-form-sub">Don't have an account? <a href="signup.html">Sign up free →</a></div>
      <div class="alert-box err" id="alertBox"><span>⚠</span><span id="alertMsg"></span></div>

      <div class="auth-field">
        <label class="auth-label">Email address</label>
        <input class="auth-input" id="email" type="email">
      </div>
      <div class="auth-field">
        <label class="auth-label">Password</label>
        <input class="auth-input" id="password" type="password">
      </div>

      <button class="auth-btn" id="loginBtn" onclick="handleLogin()">
        <span id="loginBtnText">Log in</span>
      </button>
    </div>
  </div>
</div>

<script type="module">
  import { auth } from './firebase-config.js';
  import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  window.handleLogin = async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    try {
      btn.disabled = true;
      const cred = await signInWithEmailAndPassword(auth, email, password);
      
      localStorage.setItem('folo_session', JSON.stringify({ 
        token: cred.user.accessToken, 
        user: cred.user.email 
      }));
      
      window.location.href = 'dashboard.html';
    } catch (e) {
      document.getElementById('alertBox').className = 'alert-box err show';
      document.getElementById('alertMsg').textContent = "Invalid login credentials.";
    } finally {
      btn.disabled = false;
    }
  };
</script>
</body>
</html>
