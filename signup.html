<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — Folo</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="signup.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-left">
    <div class="auth-brand">
      <a href="index.html" class="auth-logo">fo<span>lo</span></a>
      <div class="auth-headline">Start your<br><em>financial clarity</em><br>journey today.</div>
    </div>
    <!-- Perks omitted for brevity, keep your original HTML here -->
  </div>

  <div class="auth-right">
    <div class="auth-form-wrap">
      <div class="auth-form-title">Create your account</div>
      <div class="auth-form-sub">Already have an account? <a href="login.html">Log in →</a></div>
      <div class="alert-box err" id="alertBox"><span>⚠</span><span id="alertMsg"></span></div>

      <div class="form-row-2">
        <div class="auth-field"><label class="auth-label">First name</label><input class="auth-input" id="fname" type="text"></div>
        <div class="auth-field"><label class="auth-label">Last name</label><input class="auth-input" id="lname" type="text"></div>
      </div>
      <div class="auth-field"><label class="auth-label">Email address</label><input class="auth-input" id="email" type="email"></div>
      <div class="auth-field"><label class="auth-label">Password</label><input class="auth-input" id="password" type="password"></div>

      <button class="auth-btn" id="signupBtn" onclick="handleSignup()">
        <span id="signupBtnText">Create account</span>
        <div class="spinner-sm" id="signupSpinner"></div>
      </button>
    </div>
  </div>
</div>

<script type="module">
  import { auth, db } from './firebase-config.js';
  import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // Shared validation and UI helpers
  window.showAlert = (msg) => { const box = document.getElementById('alertBox'); document.getElementById('alertMsg').textContent = msg; box.className = 'alert-box err show'; };
  window.hideAlert = () => { document.getElementById('alertBox').className = 'alert-box err'; };

  window.handleSignup = async function() {
    hideAlert();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const fname = document.getElementById('fname').value.trim();
    const lname = document.getElementById('lname').value.trim();

    if(!email || password.length < 8) { showAlert("Check your email and password (min 8 chars)"); return; }

    const btn = document.getElementById('signupBtn');
    btn.disabled = true;

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      
      // Save extra user info to Firestore
      await setDoc(doc(db, "users", cred.user.uid), {
        firstName: fname,
        lastName: lname,
        email: email,
        createdAt: new Date()
      });

      localStorage.setItem('folo_session', JSON.stringify({ token: cred.user.accessToken, user: cred.user.email }));
      window.location.href = 'dashboard.html';
    } catch (e) {
      showAlert(e.message);
    } finally {
      btn.disabled = false;
    }
  };
</script>
</body>
</html>
