<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions — Folo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="transactions.css">
</head>

<body class="app-page">

  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <a href="index.html" class="sidebar-logo">fo<span>lo</span></a>
    <span class="sidebar-section">Main</span>
    <ul class="sidebar-nav">
      <li><a href="dashboard.html"><span class="nav-icon">◈</span> Dashboard</a></li>
      <li><a href="transactions.html"><span class="nav-icon">↕</span> Transactions</a></li>
      <li><a href="budgets.html"><span class="nav-icon">◻</span> Budgets</a></li>
      <li><a href="accounts.html"><span class="nav-icon">◎</span> Accounts</a></li>
    </ul>
    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebarAvatar">Y</div>
        <div>
          <div class="user-name" id="sidebarName">Your Name</div>
          <div style="font-size:0.72rem;color:rgba(255,255,255,0.4)">Personal</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:1rem;">
        <button class="hamburger-btn" onclick="openSidebar()"><span></span><span></span><span></span></button>
        <div class="topbar-title">Transactions</div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-accent btn-sm" onclick="openModal()">+ Add transaction</button>
        <button class="btn btn-ghost btn-sm" onclick="logout()">Log out</button>
      </div>
    </div>

    <div class="page-content">
      <div class="summary-row fade-in" id="summaryRow"></div>

      <div class="card fade-in-2">
        <div class="filter-bar">
          <div class="search-wrap-app">
            <span class="search-icon-app">🔍</span>
            <input class="form-input" id="searchInput" placeholder="Search transactions..." oninput="renderTable()">
          </div>
          <select class="filter-select" id="filterCat" onchange="renderTable()">
            <option value="">All categories</option>
          </select>
          <select class="filter-select" id="filterAcc" onchange="renderTable()">
            <option value="">All accounts</option>
          </select>
          <select class="filter-select" id="filterMonth" onchange="renderTable()">
            <option value="">All time</option>
          </select>
          <div class="type-toggle">
            <button id="btnAll" onclick="setType('all')" class="active-all">All</button>
            <button id="btnInc" onclick="setType('income')">Income</button>
            <button id="btnExp" onclick="setType('expense')">Expenses</button>
          </div>
        </div>

        <div style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr>
                <th>Description</th>
                <th>Date</th>
                <th>Category</th>
                <th>Account</th>
                <th style="text-align:right">Amount</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="txnTableBody"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" onclick="maybeClose(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Add transaction</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input class="form-input" id="fDesc" placeholder="e.g. Grocery Store">
      </div>
      <div class="form-row-app">
        <div class="form-group">
          <label class="form-label">Amount</label>
          <input class="form-input" id="fAmount" type="number" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label class="form-label">Type</label>
          <select class="form-select" id="fType">
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>
      </div>
      <div class="form-row-app">
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-select" id="fCat"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Account</label>
          <select class="form-select" id="fAcc"></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" id="fDate" type="date">
      </div>
      <div style="display:flex;gap:0.75rem;margin-top:1.25rem;">
        <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
        <button class="btn btn-accent" style="flex:2" onclick="saveTransaction()">Save transaction</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from './firebase-config.js';
    import {
      collection, getDocs, addDoc, updateDoc, doc, query, orderBy
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // ─── Session guard ──────────────────────────────────────────────────────────
    const session = JSON.parse(localStorage.getItem('folo_session') || 'null');
    if (!session || !session.token) window.location.replace('login.html');
    window.addEventListener('pageshow', () => {
      const s = JSON.parse(localStorage.getItem('folo_session') || 'null');
      if (!s || !s.token) window.location.replace('login.html');
    });

    const CATEGORIES = ['Food', 'Transport', 'Housing', 'Utilities', 'Healthcare', 'Entertainment',
      'Shopping', 'Education', 'Savings', 'Salary', 'Business', 'Other'];

    let appData   = { accounts: [], transactions: [] };
    let editId    = null;
    let typeFilter = 'all';
    let currentPage = 1;
    const PER_PAGE  = 12;

    const txnRef = () => collection(db, 'users', session.user.id, 'transactions');
    const accRef = () => collection(db, 'users', session.user.id, 'accounts');

    function fmt(amount) {
      return new Intl.NumberFormat('en-US', {
        style: 'currency', currency: session.user.currency || 'USD'
      }).format(Number(amount) || 0);
    }

    function fmtDate(date) {
      return new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // ─── Load ───────────────────────────────────────────────────────────────────
    async function loadTransactions() {
      try {
        const [accSnap, txnSnap] = await Promise.all([
          getDocs(accRef()),
          getDocs(query(txnRef(), orderBy('transaction_date', 'desc')))
        ]);

        appData.accounts     = accSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        appData.transactions = txnSnap.docs.map(d => ({ id: d.id, ...d.data() }));

        updateSidebar();
        populateFilters();
        renderTable();
      } catch (err) {
        console.error('Load failed:', err);
        alert('Could not load transactions. Please refresh.');
      }
    }

    // ─── Save transaction ───────────────────────────────────────────────────────
    window.saveTransaction = async function() {
      const desc           = document.getElementById('fDesc').value.trim();
      const amount         = parseFloat(document.getElementById('fAmount').value);
      const category       = document.getElementById('fCat').value;
      const accountId      = document.getElementById('fAcc').value;
      const type           = document.getElementById('fType').value;
      const transactionDate = document.getElementById('fDate').value;

      if (!desc || Number.isNaN(amount) || !accountId || !transactionDate) {
        alert('Please fill in all fields.'); return;
      }

      try {
        if (editId) {
          // Update existing
          await updateDoc(doc(db, 'users', session.user.id, 'transactions', editId), {
            description: desc,
            amount: type === 'expense' ? -Math.abs(amount) : Math.abs(amount),
            type, category, accountId, transaction_date: transactionDate
          });
          // Also update the account balance for the edited account
        } else {
          // Add new
          const finalAmount = type === 'expense' ? -Math.abs(amount) : Math.abs(amount);
          await addDoc(txnRef(), {
            description: desc,
            amount: finalAmount,
            type, category,
            accountId,
            transaction_date: transactionDate,
            createdAt: new Date().toISOString()
          });

          // Update the account balance
          const account = appData.accounts.find(a => a.id === accountId);
          if (account) {
            const newBalance = Number(account.balance || 0) + finalAmount;
            await updateDoc(doc(db, 'users', session.user.id, 'accounts', accountId), { balance: newBalance });
          }
        }

        closeModal();
        await loadTransactions();
      } catch (err) {
        console.error('Save failed:', err);
        alert(err.message || 'Failed to save transaction.');
      }
    };

    // ─── Filters ────────────────────────────────────────────────────────────────
    function populateFilters() {
      const catSelect = document.getElementById('filterCat');
      const accSelect = document.getElementById('filterAcc');
      const monthSelect = document.getElementById('filterMonth');
      const fCat = document.getElementById('fCat');
      const fAcc = document.getElementById('fAcc');

      // Category filter
      const cats = [...new Set(appData.transactions.map(t => t.category).filter(Boolean))];
      catSelect.innerHTML = '<option value="">All categories</option>' +
        cats.map(c => `<option value="${c}">${c}</option>`).join('');
      fCat.innerHTML = CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');

      // Account filter
      accSelect.innerHTML = '<option value="">All accounts</option>' +
        appData.accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
      fAcc.innerHTML = appData.accounts.length
        ? appData.accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('')
        : '<option value="">No accounts yet</option>';

      // Month filter
      const months = [...new Set(appData.transactions.map(t => (t.transaction_date || '').slice(0, 7)).filter(Boolean))].sort().reverse();
      monthSelect.innerHTML = '<option value="">All time</option>' +
        months.map(m => `<option value="${m}">${new Date(m + '-01').toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</option>`).join('');
    }

    window.setType = function(type) {
      typeFilter = type;
      currentPage = 1;
      document.getElementById('btnAll').className = type === 'all' ? 'active-all' : '';
      document.getElementById('btnInc').className = type === 'income' ? 'active-inc' : '';
      document.getElementById('btnExp').className = type === 'expense' ? 'active-exp' : '';
      renderTable();
    };

    function getFiltered() {
      const search = document.getElementById('searchInput').value.trim().toLowerCase();
      const cat    = document.getElementById('filterCat').value;
      const acc    = document.getElementById('filterAcc').value;
      const month  = document.getElementById('filterMonth').value;

      return appData.transactions.filter(t => {
        if (search && !(t.description || '').toLowerCase().includes(search) && !(t.category || '').toLowerCase().includes(search)) return false;
        if (cat   && t.category !== cat) return false;
        if (acc   && t.accountId !== acc) return false;
        if (month && !(t.transaction_date || '').startsWith(month)) return false;
        if (typeFilter === 'income'  && t.type !== 'income')  return false;
        if (typeFilter === 'expense' && t.type !== 'expense') return false;
        return true;
      }).sort((a, b) => new Date(b.transaction_date) - new Date(a.transaction_date));
    }

    window.renderTable = function() {
      const filtered   = getFiltered();
      renderSummary(filtered);
      const total      = filtered.length;
      const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
      if (currentPage > totalPages) currentPage = totalPages;
      const page = filtered.slice((currentPage - 1) * PER_PAGE, currentPage * PER_PAGE);
      const tbody = document.getElementById('txnTableBody');

      if (!page.length) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><p>No transactions found.</p></div></td></tr>';
        renderPagination(total, totalPages); return;
      }

      tbody.innerHTML = page.map(t => {
        const account = appData.accounts.find(a => a.id === t.accountId);
        const numericAmount = Math.abs(Number(t.amount));
        const displayAmount = t.type === 'expense' ? -numericAmount : numericAmount;
        return `
          <tr>
            <td style="padding:0.85rem 1rem;font-weight:500">${t.description || ''}</td>
            <td style="color:var(--muted)">${fmtDate(t.transaction_date)}</td>
            <td><span class="badge badge-gray">${t.category || 'Uncategorized'}</span></td>
            <td style="color:var(--muted)">${account ? account.name : '—'}</td>
            <td style="text-align:right" class="${t.type === 'income' ? 'amount-pos' : 'amount-neg'}">${displayAmount > 0 ? '+' : ''}${fmt(displayAmount)}</td>
            <td><div class="action-btns"><button class="icon-btn" onclick="openModal('${t.id}')" title="Edit">Edit</button></div></td>
          </tr>
        `;
      }).join('');

      renderPagination(total, totalPages);
    };

    function renderSummary(filtered) {
      const income   = filtered.filter(t => t.type === 'income').reduce((s, t) => s + Math.abs(Number(t.amount)), 0);
      const expenses = filtered.filter(t => t.type === 'expense').reduce((s, t) => s + Math.abs(Number(t.amount)), 0);
      const net = income - expenses;
      document.getElementById('summaryRow').innerHTML = `
        <div class="summary-pill">${filtered.length} transaction${filtered.length !== 1 ? 's' : ''}</div>
        <div class="summary-pill">Income: <span style="color:var(--accent);font-weight:500">${fmt(income)}</span></div>
        <div class="summary-pill">Expenses: <span style="color:var(--danger);font-weight:500">${fmt(expenses)}</span></div>
        <div class="summary-pill">Net: <span style="color:${net >= 0 ? 'var(--accent)' : 'var(--danger)'};font-weight:500">${fmt(net)}</span></div>
      `;
    }

    function renderPagination(total, totalPages) {
      const start = total === 0 ? 0 : (currentPage - 1) * PER_PAGE + 1;
      const end   = Math.min(currentPage * PER_PAGE, total);
      document.getElementById('pagination').innerHTML = `
        <span>${start}–${end} of ${total}</span>
        <div class="pg-btns">
          <button class="pg-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>&lt;</button>
          ${Array.from({ length: totalPages }, (_, i) => `<button class="pg-btn${i+1 === currentPage ? ' current' : ''}" onclick="goPage(${i+1})">${i+1}</button>`).join('')}
          <button class="pg-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>&gt;</button>
        </div>
      `;
    }

    window.goPage = function(page) {
      const totalPages = Math.max(1, Math.ceil(getFiltered().length / PER_PAGE));
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderTable();
    };

    window.openModal = function(id = null) {
      editId = id;
      document.getElementById('modalTitle').textContent = id ? 'Edit transaction' : 'Add transaction';
      if (id) {
        const t = appData.transactions.find(x => x.id === id);
        if (!t) return;
        document.getElementById('fDesc').value   = t.description || '';
        document.getElementById('fAmount').value = Math.abs(Number(t.amount)) || '';
        document.getElementById('fType').value   = t.type || 'expense';
        document.getElementById('fCat').value    = t.category || CATEGORIES[0];
        document.getElementById('fAcc').value    = t.accountId || '';
        document.getElementById('fDate').value   = (t.transaction_date || '').slice(0, 10);
      } else {
        document.getElementById('fDesc').value   = '';
        document.getElementById('fAmount').value = '';
        document.getElementById('fType').value   = 'expense';
        document.getElementById('fCat').value    = CATEGORIES[0];
        document.getElementById('fAcc').value    = appData.accounts[0]?.id || '';
        document.getElementById('fDate').value   = new Date().toISOString().slice(0, 10);
      }
      document.getElementById('modalBackdrop').classList.add('open');
    };

    window.closeModal   = () => { document.getElementById('modalBackdrop').classList.remove('open'); editId = null; };
    window.maybeClose   = e  => { if (e.target.id === 'modalBackdrop') window.closeModal(); };
    window.openSidebar  = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open'); };
    window.closeSidebar = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); };
    window.logout       = () => { localStorage.removeItem('folo_session'); sessionStorage.clear(); window.location.replace('login.html'); };

    function updateSidebar() {
      document.getElementById('sidebarName').textContent = session.user.name || 'You';
      document.getElementById('sidebarAvatar').textContent = (session.user.name || 'Y').charAt(0).toUpperCase();
    }

    loadTransactions();
  </script>

</body>
</html>
